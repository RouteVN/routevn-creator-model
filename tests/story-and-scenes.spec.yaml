---
suite: validatePayload
exportName: validatePayload
---
case: story.update rejects extra fields in data
in:
  - type: story.update
    payload:
      data:
        initialSceneId: scene-a
        title: nope
throws: payload.data.title is not allowed
---
case: scene.create rejects index and position together
in:
  - type: scene.create
    payload:
      sceneId: scene-x
      index: 0
      position: first
      data:
        name: Intro
throws: payload.index cannot be combined with payload.position
---
case: scene.update rejects unsupported fields
in:
  - type: scene.update
    payload:
      sceneId: scene-a
      data:
        type: folder
throws: payload.data.type is not allowed
---
case: scene.update accepts description-only patches
in:
  - type: scene.update
    payload:
      sceneId: scene-a
      data:
        description: Updated scene summary
---
case: scene.create accepts description
in:
  - type: scene.create
    payload:
      sceneId: scene-x
      data:
        name: Intro
        description: Opening scene
---
