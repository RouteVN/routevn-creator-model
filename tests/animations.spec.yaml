      tree: []
    images:
      items: {}
      tree: []
    sounds:
      items: {}
      tree: []
    videos:
      items: {}
      tree: []
    animations:
      items:
        folder-motion:
          id: folder-motion
          type: folder
          name: Motion
        animation-b:
          id: animation-b
