suite: processCommand
exportName: processCommand
---
case: animation.create inserts a live animation before a sibling inside a folder
in:
  - state:
      project: {}
      story:
        initialSceneId: null
      scenes:
        items: {}
        tree: []
      images:
        items: {}
        tree: []
      sounds:
        items: {}
        tree: []
      videos:
        items: {}
        tree: []
      animations:
        items:
          folder-motion:
            id: folder-motion
            type: folder
            name: Motion
          animation-b:
            id: animation-b
            type: animation
            name: Fade Out
            animation:
              type: live
              tween:
                alpha:
                  initialValue: 1
                  keyframes:
                    - duration: 500
                      value: 0
                      easing: linear
                      relative: false
        tree:
          - id: folder-motion
            children:
              - id: animation-b
                children: []
      characters:
        items: {}
        tree: []
      fonts:
        items: {}
        tree: []
      transforms:
        items: {}
        tree: []
      colors:
        items: {}
        tree: []
      textStyles:
        items: {}
        tree: []
      variables:
        items: {}
        tree: []
      layouts:
        items: {}
        tree: []
    command:
      type: animation.create
      payload:
        animationId: animation-a
        parentId: folder-motion
        position: before
        positionTargetId: animation-b
        data:
          type: animation
          name: Slide In
          animation:
            type: live
            tween:
              x:
                initialValue: 960
                keyframes:
                  - duration: 300
                    value: -120
                    easing: linear
                    relative: true
out:
