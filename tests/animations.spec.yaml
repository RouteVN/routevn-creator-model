---
suite: validatePayload
exportName: validatePayload
---
case: animation.create rejects unsupported live tween properties
in:
  - type: animation.create
    payload:
      animationId: animation-a
      data:
        type: animation
        name: Shake
        animation:
          type: live
          tween:
            skewX:
              keyframes:
                - duration: 200
                  value: 10
throws: "payload.data.animation.tween.skewX is not a supported live tween property"
---
case: animation.update rejects unsupported easing values
in:
  - type: animation.update
    payload:
      animationId: animation-a
      data:
        animation:
          type: live
          tween:
            x:
              initialValue: 10
              keyframes:
                - duration: 300
                  value: 50
                  easing: easeInWhatever
throws: "payload.data.animation.tween.x.keyframes[0].easing must be a supported Route Graphics easing"
