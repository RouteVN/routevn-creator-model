---
suite: validatePayload
exportName: validatePayload
---
case: font.create rejects missing fontFamily
in:
  - type: font.create
    payload:
      fontId: font-a
      data:
        type: font
        name: Display
        fileId: file-a
throws: "payload.data.fontFamily must be a non-empty string"
---
case: color.create rejects an invalid hex string
in:
  - type: color.create
    payload:
      colorId: color-a
      data:
        type: color
        name: Primary
        hex: red
throws: "payload.data.hex must be a #RRGGBB string"
