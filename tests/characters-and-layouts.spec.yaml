case: character.sprite.create inserts an image sprite inside a character
in:
  - state:
      project: {}
      story:
        initialSceneId: null
      scenes:
        items: {}
        tree: []
      images:
        items: {}
        tree: []
      sounds:
        items: {}
        tree: []
      videos:
        items: {}
        tree: []
      animations:
        items: {}
        tree: []
      characters:
        items:
          character-hero:
            id: character-hero
            type: character
            name: Hero
            sprites:
              items:
                folder-default:
                  id: folder-default
                  type: folder
                  name: Default
              tree:
                - id: folder-default
                  children: []
        tree:
          - id: character-hero
            children: []
      fonts:
        items: {}
        tree: []
      transforms:
        items: {}
        tree: []
      colors:
        items: {}
        tree: []
      textStyles:
        items: {}
        tree: []
      variables:
        items: {}
        tree: []
      layouts:
        items: {}
        tree: []
    command:
      type: character.sprite.create
      payload:
        characterId: character-hero
        spriteId: sprite-happy
        parentId: folder-default
        data:
          type: image
          name: Happy
          fileId: file-happy
          width: 512
          height: 512
out:
  state:
    project: {}
    story:
      initialSceneId: null
    scenes:
      items: {}
      tree: []
    images:
      items: {}
      tree: []
    sounds:
      items: {}
      tree: []
    videos:
      items: {}
      tree: []
    animations:
      items: {}
      tree: []
    characters:
      items:
        character-hero:
          id: character-hero
          type: character
          name: Hero
          sprites:
            items:
              folder-default:
                id: folder-default
                type: folder
                name: Default
              sprite-happy:
                id: sprite-happy
                type: image
                name: Happy
                fileId: file-happy
                width: 512
                height: 512
            tree:
              - id: folder-default
                children:
                  - id: sprite-happy
                    children: []
      tree:
        - id: character-hero
          children: []
    fonts:
      items: {}
      tree: []
    transforms:
      items: {}
      tree: []
    colors:
      items: {}
      tree: []
    textStyles:
      items: {}
      tree: []
    variables:
      items: {}
      tree: []
    layouts:
      items: {}
      tree: []
