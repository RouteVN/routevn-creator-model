file: "./support/putyApi.js"
group: model
suites: [processCommand, validatePayload, validateAgainstState]
---
suite: processCommand
exportName: processCommand
---
case: scene.move reorders a scene at the root level
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items: {}
              tree: []
          folder-prologue:
            id: folder-prologue
            type: folder
            name: Prologue
          scene-b:
            id: scene-b
            type: scene
            name: Flashback
            sections:
              items: {}
              tree: []
        tree:
          - id: scene-a
            children: []
          - id: folder-prologue
            children:
              - id: scene-b
                children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: scene.move
      payload:
        sceneId: scene-b
        position: before
        positionTargetId: scene-a
out:
  state:
    project: {}
    story:
      initialSceneId: scene-a
    scenes:
      items:
        scene-a:
          id: scene-a
          type: scene
          name: Intro
          sections:
            items: {}
            tree: []
        folder-prologue:
          id: folder-prologue
          type: folder
          name: Prologue
        scene-b:
          id: scene-b
          type: scene
          name: Flashback
          sections:
            items: {}
            tree: []
      tree:
        - id: scene-b
          children: []
        - id: scene-a
          children: []
        - id: folder-prologue
          children: []
    images: { items: {}, tree: [] }
    sounds: { items: {}, tree: [] }
    videos: { items: {}, tree: [] }
    animations: { items: {}, tree: [] }
    characters: { items: {}, tree: [] }
    fonts: { items: {}, tree: [] }
    transforms: { items: {}, tree: [] }
    colors: { items: {}, tree: [] }
    textStyles: { items: {}, tree: [] }
    variables: { items: {}, tree: [] }
    layouts: { items: {}, tree: [] }
---
case: scene.delete cascades descendant scenes sections and lines
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items:
                section-a:
                  id: section-a
                  name: Opening
                  lines:
                    items:
                      line-a:
                        id: line-a
                        actions:
                          say: hello
                    tree:
                      - id: line-a
              tree:
                - id: section-a
                  children: []
          folder-prologue:
            id: folder-prologue
            type: folder
            name: Prologue
          scene-b:
            id: scene-b
            type: scene
            name: Flashback
            sections:
              items:
                section-b:
                  id: section-b
                  name: Flashback
                  lines:
                    items:
                      line-b:
                        id: line-b
                        actions:
                          say: remember
                    tree:
                      - id: line-b
              tree:
                - id: section-b
                  children: []
          scene-c:
            id: scene-c
            type: scene
            name: Outro
            sections:
              items: {}
              tree: []
        tree:
          - id: scene-a
            children: []
          - id: folder-prologue
            children:
              - id: scene-b
                children: []
          - id: scene-c
            children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: scene.delete
      payload:
        sceneIds:
          - scene-a
          - folder-prologue
out:
  state:
    project: {}
    story:
      initialSceneId: scene-c
    scenes:
      items:
        scene-c:
          id: scene-c
          type: scene
          name: Outro
          sections:
            items: {}
            tree: []
      tree:
        - id: scene-c
          children: []
    images: { items: {}, tree: [] }
    sounds: { items: {}, tree: [] }
    videos: { items: {}, tree: [] }
    animations: { items: {}, tree: [] }
    characters: { items: {}, tree: [] }
    fonts: { items: {}, tree: [] }
    transforms: { items: {}, tree: [] }
    colors: { items: {}, tree: [] }
    textStyles: { items: {}, tree: [] }
    variables: { items: {}, tree: [] }
    layouts: { items: {}, tree: [] }
---
suite: validatePayload
exportName: validatePayload
---
case: scene.delete rejects duplicate scene ids
in:
  - type: scene.delete
    payload:
      sceneIds:
        - scene-a
        - scene-a
throws: "payload.sceneIds[1] must be unique"
---
suite: validateAgainstState
exportName: validateAgainstState
---
case: scene.move rejects moving a scene under its own descendant
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          folder-a:
            id: folder-a
            type: folder
            name: Folder A
          folder-b:
            id: folder-b
            type: folder
            name: Folder B
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items: {}
              tree: []
        tree:
          - id: folder-a
            children:
              - id: folder-b
                children:
                  - id: scene-a
                    children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: scene.move
      payload:
        sceneId: folder-a
        parentId: folder-b
        position: last
throws: "payload.parentId must not target the moved scene or its descendants"
---
case: scene.delete rejects unknown scene ids
in:
  - state:
      project: {}
      story:
        initialSceneId: null
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items: {}
              tree: []
        tree:
          - id: scene-a
            children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: scene.delete
      payload:
        sceneIds:
          - scene-a
          - scene-b
throws: "payload.sceneIds must reference existing scenes"
