file: "../src/index.js"
group: model
suites: [processCommand, validatePayload, validateAgainstState]
---
suite: processCommand
exportName: processCommand
---
case: scene.move reorders a scene at the root level
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
          folder-prologue:
            id: folder-prologue
            type: folder
            name: Prologue
          scene-b:
            id: scene-b
            type: scene
            name: Flashback
        tree:
          - id: scene-a
            children: []
          - id: folder-prologue
            children:
              - id: scene-b
                children: []
      sections:
        items: {}
        tree: []
      lines:
        items: {}
        tree: []
      images:
        items: {}
        tree: []
      sounds:
        items: {}
        tree: []
      videos:
        items: {}
        tree: []
      animations:
        items: {}
        tree: []
      characters:
        items: {}
        tree: []
      fonts:
        items: {}
        tree: []
      transforms:
        items: {}
        tree: []
      colors:
        items: {}
        tree: []
      textStyles:
        items: {}
        tree: []
      variables:
        items: {}
        tree: []
      layouts:
        items: {}
        tree: []
    command:
      type: scene.move
      payload:
        sceneId: scene-b
        position: before
        positionTargetId: scene-a
out:
  state:
    project: {}
    story:
      initialSceneId: scene-a
    scenes:
      items:
        scene-a:
          id: scene-a
          type: scene
          name: Intro
        folder-prologue:
          id: folder-prologue
          type: folder
          name: Prologue
        scene-b:
          id: scene-b
          type: scene
          name: Flashback
      tree:
        - id: scene-b
          children: []
        - id: scene-a
          children: []
        - id: folder-prologue
          children: []
    sections:
      items: {}
      tree: []
    lines:
      items: {}
      tree: []
    images:
      items: {}
      tree: []
    sounds:
      items: {}
      tree: []
