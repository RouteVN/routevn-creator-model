case: section.delete cascades descendant sections and their lines
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items:
                section-a1:
                  id: section-a1
                  name: Setup
                  lines:
                    items:
                      line-a1:
                        id: line-a1
                        actions:
                          say: hello
                    tree:
                      - id: line-a1
                section-a-child:
                  id: section-a-child
                  name: Child
                  lines:
                    items:
                      line-a-child:
                        id: line-a-child
                        actions:
                          say: nested
                    tree:
                      - id: line-a-child
              tree:
                - id: section-a1
                  children:
                    - id: section-a-child
                      children: []
        tree:
          - id: scene-a
            children: []
