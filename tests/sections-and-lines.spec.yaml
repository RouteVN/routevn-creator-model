file: "./support/putyApi.js"
group: model
suites: [processCommand, validatePayload, validateAgainstState]
---
suite: processCommand
exportName: processCommand
---
case: section.create inserts a section before a root sibling in the same scene scope
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items:
                section-a1:
                  id: section-a1
                  name: Setup
                  lines:
                    items: {}
                    tree: []
              tree:
                - id: section-a1
                  children: []
          scene-b:
            id: scene-b
            type: scene
            name: Outro
            sections:
              items:
                section-b1:
                  id: section-b1
                  name: Ending
                  lines:
                    items: {}
                    tree: []
              tree:
                - id: section-b1
                  children: []
        tree:
          - id: scene-a
            children: []
          - id: scene-b
            children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: section.create
      payload:
        sectionId: section-a0
        sceneId: scene-a
        position: before
        positionTargetId: section-a1
        data:
          name: Opening
out:
  state:
    project: {}
    story:
      initialSceneId: scene-a
    scenes:
      items:
        scene-a:
          id: scene-a
          type: scene
          name: Intro
          sections:
            items:
              section-a1:
                id: section-a1
                name: Setup
                lines:
                  items: {}
                  tree: []
              section-a0:
                id: section-a0
                name: Opening
                lines:
                  items: {}
                  tree: []
            tree:
              - id: section-a0
                children: []
              - id: section-a1
                children: []
        scene-b:
          id: scene-b
          type: scene
          name: Outro
          sections:
            items:
              section-b1:
                id: section-b1
                name: Ending
                lines:
                  items: {}
                  tree: []
            tree:
              - id: section-b1
                children: []
      tree:
        - id: scene-a
          children: []
        - id: scene-b
          children: []
    images: { items: {}, tree: [] }
    sounds: { items: {}, tree: [] }
    videos: { items: {}, tree: [] }
    animations: { items: {}, tree: [] }
    characters: { items: {}, tree: [] }
    fonts: { items: {}, tree: [] }
    transforms: { items: {}, tree: [] }
    colors: { items: {}, tree: [] }
    textStyles: { items: {}, tree: [] }
    variables: { items: {}, tree: [] }
    layouts: { items: {}, tree: [] }
