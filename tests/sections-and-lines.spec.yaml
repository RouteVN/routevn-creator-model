---
suite: validatePayload
exportName: validatePayload
---
case: section.create rejects unsupported fields in data
in:
  - type: section.create
    payload:
      sectionId: section-a
      sceneId: scene-a
      data:
        name: Intro
        notes: nope
throws: "payload.data.notes is not allowed"
---
case: line.create rejects duplicate line ids in a batch
in:
  - type: line.create
    payload:
      sectionId: section-a
      lines:
        - lineId: line-1
          data:
            actions: {}
        - lineId: line-1
          data:
            actions: {}
throws: "payload.lines[1].lineId must be unique"
---
case: line.delete rejects an empty batch
in:
  - type: line.delete
    payload:
      lineIds: []
throws: "payload.lineIds must be a non-empty array"
---
case: line.move rejects parentId because line trees are flat
in:
  - type: line.move
    payload:
      lineId: line-a
      toSectionId: section-b
      parentId: section-parent
throws: "payload.parentId is not allowed"
---
suite: validateAgainstState
exportName: validateAgainstState
---
case: section.create rejects folder scenes
in:
  - state:
      project: {}
      story:
        initialSceneId: null
      scenes:
        items:
          folder-scenes:
            id: folder-scenes
            type: folder
            name: Folder
        tree:
          - id: folder-scenes
            children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: section.create
      payload:
        sectionId: section-a
        sceneId: folder-scenes
        data:
          name: Intro
throws: "payload.sceneId must reference a non-folder scene"
---
