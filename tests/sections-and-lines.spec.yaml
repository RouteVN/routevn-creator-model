case: line.create inserts multiple lines into the requested section scope
in:
  - state:
      project: {}
      story:
        initialSceneId: scene-a
      scenes:
        items:
          scene-a:
            id: scene-a
            type: scene
            name: Intro
            sections:
              items:
                section-a:
                  id: section-a
                  name: Setup
                  lines:
                    items:
                      line-existing:
                        id: line-existing
                        actions:
                          say: existing
                    tree:
                      - id: line-existing
                section-b:
                  id: section-b
                  name: Payoff
                  lines:
                    items:
                      line-other:
                        id: line-other
                        actions:
                          say: other
                    tree:
                      - id: line-other
              tree:
                - id: section-a
                  children: []
                - id: section-b
                  children: []
        tree:
          - id: scene-a
            children: []
      images: { items: {}, tree: [] }
      sounds: { items: {}, tree: [] }
      videos: { items: {}, tree: [] }
      animations: { items: {}, tree: [] }
      characters: { items: {}, tree: [] }
      fonts: { items: {}, tree: [] }
      transforms: { items: {}, tree: [] }
      colors: { items: {}, tree: [] }
      textStyles: { items: {}, tree: [] }
      variables: { items: {}, tree: [] }
      layouts: { items: {}, tree: [] }
    command:
      type: line.create
      payload:
        sectionId: section-a
        position: after
        positionTargetId: line-existing
        lines:
          - lineId: line-1
            data:
              actions:
                say: hello
          - lineId: line-2
            data:
              actions:
                say: bye
out:
  state:
    project: {}
    story:
      initialSceneId: scene-a
    scenes:
      items:
        scene-a:
          id: scene-a
          type: scene
          name: Intro
          sections:
            items:
              section-a:
                id: section-a
                name: Setup
                lines:
                  items:
                    line-existing:
                      id: line-existing
                      actions:
                        say: existing
                    line-1:
                      id: line-1
                      actions:
                        say: hello
                    line-2:
                      id: line-2
                      actions:
                        say: bye
                  tree:
                    - id: line-existing
                    - id: line-1
                    - id: line-2
              section-b:
                id: section-b
                name: Payoff
                lines:
                  items:
                    line-other:
                      id: line-other
                      actions:
                        say: other
                  tree:
                    - id: line-other
            tree:
              - id: section-a
                children: []
              - id: section-b
                children: []
      tree:
        - id: scene-a
          children: []
    images: { items: {}, tree: [] }
