suite: validatePayload
exportName: validatePayload
---
case: image.create rejects missing fileId for image items
in:
  - type: image.create
    payload:
      imageId: image-a
      data:
        type: image
        name: Background
throws: "payload.data.fileId must be a non-empty string"
---
case: image.update rejects unsupported fields
in:
  - type: image.update
    payload:
      imageId: image-a
      data:
        type: image
throws: "payload.data.type is not allowed"
